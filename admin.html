<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Otomatis - Fix</title>
<style>
body{font-family:system-ui;background:#f6f6f7;padding:20px;max-width:720px;margin:auto}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.06);margin-bottom:20px}
input{width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;margin:8px 0}
button{padding:10px 16px;border:0;border-radius:10px;font-weight:600;cursor:pointer}
.btn{background:#111;color:#fff}.btn-del{background:#ffe0e0;color:#a00;margin-left:8px}
.item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee}
.thumb{width:120px;height:68px;background:#000;border-radius:8px;object-fit:cover}
small{color:#888}
</style>
</head>
<body>
<h2>Admin Portfolio - Rifandi (Fixed)</h2>
<div class="card">
<h3>1. Daftar Video Saat Ini</h3>
<div id="list">Loading...</div>
<small>Format baru: array string ID 11 huruf, kompatibel dengan halaman utama kamu.</small>
</div>
<div class="card">
<h3>2. Tambah Video YouTube</h3>
<input id="url" placeholder="https://www.youtube.com/watch?v=JD0W2RYtv58">
<button class="btn" id="add">Tambah</button>
<div id="msg" style="margin-top:10px"></div>
</div>
<script>
const OWNER='daprilrifandi', REPO='portfolio', BRANCH='main', PATH='media/videos.json';
const TOKEN_KEY='gh_token'; const KUNCI='rifandi123';
const q=new URLSearchParams(location.search); if(q.get('kunci')!==KUNCI){document.body.innerHTML='<h3>Kunci salah. Tambahkan ?kunci=rifandi123</h3>'; throw '';}
function getToken(){let t=localStorage.getItem(TOKEN_KEY); if(!t){t=prompt('Paste GitHub Token (ghp_...) sekali aja:'); if(t){localStorage.setItem(TOKEN_KEY,t.trim())}} return t?.trim()}
function yt(u){const m=u.match(/(?:youtu\.be\/|v=|embed\/|shorts\/)([A-Za-z0-9_-]{11})/); return m?m[1]:null}
async function gh(path, method='GET', body, token){
 const url=`https://api.github.com/repos/${OWNER}/${REPO}/contents/${path}${method==='GET'?'?ref='+BRANCH:''}`;
 const r=await fetch(url,{method,headers:{Authorization:'Bearer '+token,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});
 if(!r.ok) throw new Error(await r.text()); return r.json();
}
async function load(){
 const token=getToken(); if(!token) return;
 try{
  const j=await gh(PATH,'GET',null,token);
  const data=JSON.parse(atob(j.content.replace(/\n/g,'')));
  // normalisasi: bisa string atau object
  const ids=(Array.isArray(data)?data:[]).map(v=> typeof v==='string'?v : (v.id||v.url||'')).filter(Boolean);
  const div=document.getElementById('list'); div.innerHTML='';
  if(ids.length===0) div.innerHTML='<small>Belum ada video</small>';
  ids.forEach((id,i)=>{
    const row=document.createElement('div'); row.className='item';
    row.innerHTML=`<div style="display:flex;gap:12px;align-items:center"><img class="thumb" src="https://img.youtube.com/vi/${id}/mqdefault.jpg"><div><b>${id}</b><br><small>youtube.com/watch?v=${id}</small></div></div><button class="btn-del">Hapus</button>`;
    row.querySelector('button').onclick=async()=>{
      if(!confirm('Hapus '+id+'?')) return;
      const newIds=ids.filter((_,idx)=>idx!==i);
      await save(newIds, j.sha);
    };
    div.appendChild(row);
  });
  window._sha=j.sha; window._ids=ids;
 }catch(e){ document.getElementById('list').innerHTML='<small>videos.json belum ada / kosong. Tambah baru aja.</small>'; window._sha=null; window._ids=[]; }
}
async function save(ids, sha){
 const token=getToken(); const content=btoa(unescape(encodeURIComponent(JSON.stringify(ids,null,2))));
 const body={message:`update videos via admin fix`, content, branch:BRANCH}; if(sha) body.sha=sha;
 await gh(PATH,'PUT',body,token); document.getElementById('msg').textContent='Berhasil! Tunggu 2 menit lalu refresh halaman utama ?v=baru'; setTimeout(load,1000);
}
document.getElementById('add').onclick=async()=>{
 const u=document.getElementById('url').value.trim(); const id=yt(u);
 if(!id){alert('Link YouTube tidak valid. Pakai link dengan v= 11 huruf'); return;}
 const ids=window._ids||[]; if(ids.includes(id)){alert('Video sudah ada'); return;}
 ids.unshift(id); await save(ids, window._sha);
};
load();
</script>
</body>
</html>
