<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><title>Admin Rahasia</title></head><body>
<script>if(!location.search.includes("kunci=rifandi123")){document.body.innerHTML="<h1>404</h1>";throw 0}</script>

<h2>Upload Foto</h2>
<input type="file" id="f" accept="image/*"> <button onclick="up()">Upload</button>
<div id="s"></div>

<hr><h2>Daftar Foto (klik hapus)</h2>
<div id="list">Loading...</div>

<script>
const owner='daprilrifandi', repo='portfolio', path='media';
let token = localStorage.getItem('gh_pat') || prompt('Tempel PAT kamu:'); localStorage.setItem('gh_pat',token);

async function up(){
  const file=document.getElementById('f').files[0]; if(!file)return alert('pilih file');
  document.getElementById('s').innerText='Uploading...';
  const b64 = await file.arrayBuffer().then(b=>btoa(String.fromCharCode(...new Uint8Array(b))));
  const nama='foto'+Date.now()+'.jpg';
  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}/${nama}`,{
    method:'PUT', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({message:'upload '+nama, content:b64})
  });
  document.getElementById('s').innerText='✅ Upload selesai!'; loadList();
}

async function loadList(){
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{headers:{Authorization:'Bearer '+token}});
  const files = await res.json();
  document.getElementById('list').innerHTML = files.filter(f=>f.name.endsWith('.jpg')).map(f=>
    `<div>${f.name} <button onclick="del('${f.path}','${f.sha}')">Hapus</button></div>`
  ).join('');
}
async function del(path,sha){
  if(!confirm('Yakin hapus?'))return;
  await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`,{
    method:'DELETE', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
    body:JSON.stringify({message:'delete '+path, sha})
  });
  loadList();
}
loadList();
</script></body></html>
