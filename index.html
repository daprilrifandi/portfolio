<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Portofolio Rifandi Dapril</title>
<style>
 body{margin:0;font-family:-apple-system,sans-serif;background:#fafafa}
 header{text-align:center;padding:50px 20px 20px}
.gallery{column-count:4;column-gap:16px;max-width:1200px;margin:auto;padding:20px}
.item{break-inside:avoid;margin-bottom:16px;border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 4px 12px rgba(0,0,0,.08);transition:transform.35s ease, box-shadow.35s ease; cursor:pointer}
.item:hover{transform:scale(1.05);box-shadow:0 14px 28px rgba(0,0,0,.18);z-index:5}
.item img{width:100%;display:block}
.item iframe{width:100%;aspect-ratio:16/9;border:0;display:block;pointer-events:none}
.item:hover iframe{pointer-events:auto}
 @media(max-width:900px){.gallery{column-count:3}}@media(max-width:600px){.gallery{column-count:2}}
.kontak{text-align:center;padding:50px 20px;background:#fff;margin-top:30px}
.btn{display:inline-block;margin:6px;padding:12px 20px;background:#f1f1f1;border-radius:10px;text-decoration:none;color:#000}
</style></head><body>
<header><h1>Portofolio Rifandi Dapril</h1><p>Foto & Video campur acak</p></header>
<div id="gallery" class="gallery"></div>
<script>
async function load(){
 const t='?t='+Date.now();
 const [imgs,vids]=await Promise.all([
  fetch('https://raw.githubusercontent.com/daprilrifandi/portfolio/main/media/list.json'+t).then(r=>r.json()).catch(()=>[]),
  fetch('https://raw.githubusercontent.com/daprilrifandi/portfolio/main/media/videos.json'+t).then(r=>r.json()).catch(()=>[])
 ]);
 let items=[];imgs.forEach(n=>{if(n!=='list.json'&&n!=='videos.json')items.push({t:'img',v:n})});vids.forEach(id=>items.push({t:'yt',v:id}));
 for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]]}
 const g=document.getElementById('gallery');
 items.forEach(it=>{const d=document.createElement('div');d.className='item';
  if(it.t==='img')d.innerHTML=`<img src="https://raw.githubusercontent.com/daprilrifandi/portfolio/main/media/${it.v}" loading="lazy">`;
  else d.innerHTML=`<iframe src="https://www.youtube.com/embed/${it.v}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;
  g.appendChild(d);});
}load();
</script>
